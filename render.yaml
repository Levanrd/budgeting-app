services:
  - type: web
    name: budgeting-app-api
    runtime: node
    rootDir: server
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: SEED_USERS
        value: "false"
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        sync: false
